<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#020617" />
    <title>Essence Suno Offline</title>
    <style>
      :root {
        color-scheme: dark;
        --safe-area-top: env(safe-area-inset-top, 0px);
        --safe-area-right: env(safe-area-inset-right, 0px);
        --safe-area-bottom: env(safe-area-inset-bottom, 0px);
        --safe-area-left: env(safe-area-inset-left, 0px);
        font-family:
          Geist,
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      body {
        min-height: 100dvh;
        margin: 0;
        display: grid;
        place-items: center;
        box-sizing: border-box;
        background:
          radial-gradient(circle at 20% 20%, rgba(56, 189, 248, 0.12), transparent 30rem),
          #020617;
        color: #f8fafc;
        overflow-x: hidden;
        padding:
          calc(1rem + var(--safe-area-top))
          max(1rem, var(--safe-area-right))
          calc(1rem + var(--safe-area-bottom))
          max(1rem, var(--safe-area-left));
      }

      main {
        width: min(34rem, 100%);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 0.75rem;
        background: rgba(15, 23, 42, 0.78);
        padding: 1.25rem;
        box-shadow: 0 1.5rem 4rem rgba(2, 6, 23, 0.45);
      }

      img {
        width: 3rem;
        height: 3rem;
      }

      h1 {
        margin: 1rem 0 0.5rem;
        font-size: clamp(1.5rem, 5vw, 2.25rem);
        line-height: 1;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: #cbd5e1;
        line-height: 1.6;
      }

      ul {
        margin: 1rem 0 0;
        padding-left: 1.2rem;
        color: #e2e8f0;
        line-height: 1.7;
      }

      button {
        margin-top: 1rem;
        border: 0;
        border-radius: 0.5rem;
        background: #f8fafc;
        color: #020617;
        cursor: pointer;
        font: inherit;
        font-weight: 700;
        padding: 0.65rem 0.9rem;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/icon.svg" alt="" />
      <h1>Essence is offline</h1>
      <p>
        Your local workspace can stay open, but cloud sync, sharing, and
        generation need a connection.
      </p>
      <ul>
        <li>Keep drafting lyrics and organizing ideas already open.</li>
        <li>Reconnect before publishing, syncing, or requesting generation.</li>
        <li>Refresh once the connection is back.</li>
      </ul>
      <button type="button" onclick="window.location.reload()">Try again</button>
    </main>
  </body>
</html>
